name: md_to_pdf
description: Secure Markdown to PDF Converter & Viewer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  file_picker: ^8.0.0
  markdown: ^7.2.2
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_pdfview: ^1.3.2
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  flutter_riverpod: ^2.5.1
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.4.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/fonts/
  fonts: []
